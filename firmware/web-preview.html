<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HiveMonitor Preview</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;background:#f5f7f2;color:#18231b}
    main{max-width:980px;margin:0 auto;padding:20px}
    h1{font-size:28px;margin:0 0 16px}
    section{background:#fff;border:1px solid #d9dfd3;border-radius:8px;padding:16px;margin:12px 0}
    fieldset{border:1px solid #d9dfd3;border-radius:8px;margin:12px 0;padding:12px}
    legend{font-weight:700;color:#243626;padding:0 6px}
    label{display:block;font-size:13px;margin:10px 0 4px;color:#40503e}
    input,select{box-sizing:border-box;width:100%;padding:9px;border:1px solid #b9c3b2;border-radius:6px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px 14px}
    button{padding:10px 14px;border:0;border-radius:6px;background:#236b3a;color:white;cursor:pointer;margin:8px 8px 0 0}
    button.secondary{background:#52665a}
    pre{white-space:pre-wrap;background:#eef2ea;padding:12px;border-radius:6px;overflow:auto}
  </style>
</head>
<body>
<main>
  <h1>HiveMonitor</h1>
  <section><h2>Текущие показания</h2><pre id="status">Загрузка...</pre></section>
  <section>
    <h2>Настройки</h2>
    <fieldset><legend>Устройство</legend><div class="grid">
      <div><label>Device ID</label><input id="deviceId"></div><div><label>Device Token</label><input id="deviceToken"></div><div><label>Пароль администратора</label><input id="adminPassword" type="password"></div>
    </div></fieldset>
    <fieldset><legend>Wi-Fi и точка доступа</legend><div class="grid">
      <div><label>Wi-Fi SSID</label><input id="wifiSsid"></div><div><label>Wi-Fi пароль</label><input id="wifiPassword" type="password"></div><div><label>AP пароль восстановления</label><input id="apPassword" type="password"></div>
    </div></fieldset>
    <fieldset><legend>MQTT</legend><div class="grid">
      <div><label>MQTT host</label><input id="mqttHost"></div><div><label>MQTT port</label><input id="mqttPort" type="number"></div><div><label>MQTT TLS</label><select id="mqttTls"><option value="false">без TLS</option><option value="true">с TLS</option></select></div><div><label>MQTT user</label><input id="mqttUser"></div><div><label>MQTT пароль</label><input id="mqttPassword" type="password"></div>
    </div></fieldset>
    <fieldset><legend>Весы HX711</legend><div class="grid">
      <div><label>Весы</label><select id="weightEnabled"><option value="true">включены</option><option value="false">выключены</option></select></div><div><label>HX711 DOUT</label><input id="hx711DoutPin" type="number"></div><div><label>HX711 SCK</label><input id="hx711SckPin" type="number"></div><div><label>Смещение тары</label><input id="tareOffset" type="number"></div><div><label>Коэффициент калибровки</label><input id="calibrationFactor" type="number" step="0.0001"></div><div><label>Весовой порог, кг</label><input id="weightThresholdKg" type="number" step="0.01"></div><div><label>Значимое изменение, кг</label><input id="significantWeightChangeKg" type="number" step="0.01"></div>
    </div></fieldset>
    <fieldset><legend>Климат</legend><div class="grid">
      <div><label>Температура</label><select id="temperatureEnabled"><option value="true">включена</option><option value="false">выключена</option></select></div><div><label>Влажность</label><select id="humidityEnabled"><option value="true">включена</option><option value="false">выключена</option></select></div><div><label>DHT тип</label><select id="thSensorType"><option>DHT22</option><option>DHT11</option><option>DHT21</option></select></div><div><label>DHT пин</label><input id="thSensorPin" type="number"></div><div><label>Темп. тип</label><select id="temperatureSensorType"><option>DHT22</option><option>DHT11</option><option>DHT21</option></select></div><div><label>Темп. пин</label><input id="temperatureSensorPin" type="number"></div><div><label>Влажн. тип</label><select id="humiditySensorType"><option>DHT22</option><option>DHT11</option><option>DHT21</option></select></div><div><label>Влажн. пин</label><input id="humiditySensorPin" type="number"></div>
    </div></fieldset>
    <fieldset><legend>Открытие улья</legend><div class="grid">
      <div><label>Hall датчик</label><select id="hallEnabled"><option value="true">включен</option><option value="false">выключен</option></select></div><div><label>Hall пин</label><input id="hallPin" type="number"></div><div><label>Открыто при HIGH</label><select id="hallOpenLevelHigh"><option value="false">нет</option><option value="true">да</option></select></div><div><label>Hall wake</label><select id="hallWakeMode"><option value="HALL_NO_WAKE">без wake</option><option value="HALL_WAKE_RST">RST wake</option></select></div>
    </div></fieldset>
    <fieldset><legend>Батарея</legend><div class="grid">
      <div><label>Батарея</label><select id="batteryEnabled"><option value="true">включена</option><option value="false">выключена</option></select></div><div><label>ADC пин</label><input id="batteryAdcPin" type="number"></div><div><label>Мин. напряжение</label><input id="batteryMinVoltage" type="number" step="0.01"></div><div><label>Макс. напряжение</label><input id="batteryMaxVoltage" type="number" step="0.01"></div><div><label>Делитель</label><input id="batteryDividerRatio" type="number" step="0.01"></div><div><label>ADC reference</label><input id="adcReferenceVoltage" type="number" step="0.01"></div><div><label>ADC max</label><input id="adcMaxValue" type="number"></div>
    </div></fieldset>
    <fieldset><legend>Время и измерения</legend><div class="grid">
      <div><label>Источник времени</label><select id="timeSource"><option>NTP</option><option>RTC</option><option>AUTO</option></select></div><div><label>NTP server</label><input id="ntpServer"></div><div><label>Timezone, мин</label><input id="timezoneOffsetMinutes" type="number"></div><div><label>RTC sync, мин</label><input id="rtcNtpSyncIntervalMinutes" type="number"></div><div><label>Период, сек</label><input id="measurementIntervalSeconds" type="number"></div><div><label>Deep sleep</label><select id="deepSleepEnabled"><option value="false">выключен</option><option value="true">включен</option></select></div>
    </div></fieldset>
    <button onclick="saveConfig()">Сохранить</button>
    <button class="secondary" onclick="tare()">Тарировать</button>
    <button class="secondary" onclick="calibrate()">Калибровать</button>
    <button class="secondary" onclick="clearBuffer()">Очистить буфер</button>
    <button class="secondary" onclick="resetConfig()">Сбросить настройки</button>
    <button class="secondary" onclick="restartDevice()">Перезагрузить</button>
    <button class="secondary" onclick="alert('На устройстве откроется /update')">Обновить прошивку</button>
  </section>
</main>
<script>
let config = {
  deviceId: 'hive-demo-8266',
  deviceToken: 'demo-token',
  adminPassword: 'admin',
  wifi: {ssid: 'HiveWiFi', password: 'secret', apFallbackEnabled: true, apPassword: 'hivemonitor'},
  mqtt: {host: '192.168.1.10', port: 1883, tls: false, user: 'hive-demo-8266', password: ''},
  weight: {enabled: true, doutPin: 4, sckPin: 0, calibrationFactor: 1, tareOffset: 1200, thresholdKg: 5, significantChangeKg: 20},
  environment: {temperatureEnabled: true, humidityEnabled: true, combinedType: 'DHT22', combinedPin: 2, temperatureType: 'DHT22', temperaturePin: 2, humidityType: 'DHT22', humidityPin: 2},
  hall: {enabled: true, pin: 14, openLevelHigh: false, wakeMode: 'HALL_NO_WAKE'},
  battery: {enabled: true, adcPin: 17, minVoltage: 3.2, maxVoltage: 4.2, dividerRatio: 1, adcReferenceVoltage: 3.3, adcMaxValue: 1023},
  time: {source: 'NTP', ntpServer: 'pool.ntp.org', timezoneOffsetMinutes: 0, rtcNtpSyncIntervalMinutes: 1440},
  measurementIntervalSeconds: 1800,
  deepSleepEnabled: false
};
function mockStatus() {
  return {
    firmwareVersion: '0.1.0',
    ip: '192.168.1.50',
    wifiConnected: true,
    rssi: -57,
    freeHeap: 45608,
    buffer: {pendingCount: 2, sizeBytes: 512},
    telemetry: {
      deviceId: config.deviceId,
      timestamp: new Date().toISOString(),
      weight: 42.35,
      weightChange: -0.18,
      temperature: 24.7,
      humidity: 61.2,
      hiveOpened: false,
      batteryPercent: 84,
      batteryVoltage: 4.04
    }
  };
}
async function load() {
  status.textContent = JSON.stringify(mockStatus(), null, 2);
  deviceId.value = config.deviceId || '';
  deviceToken.value = config.deviceToken || '';
  adminPassword.value = config.adminPassword || '';
  wifiSsid.value = config.wifi?.ssid || '';
  wifiPassword.value = config.wifi?.password || '';
  apPassword.value = config.wifi?.apPassword || '';
  mqttHost.value = config.mqtt?.host || '';
  mqttPort.value = config.mqtt?.port || 1883;
  mqttTls.value = String(!!config.mqtt?.tls);
  mqttUser.value = config.mqtt?.user || '';
  mqttPassword.value = config.mqtt?.password || '';
  weightEnabled.value = String(config.weight?.enabled ?? true);
  hx711DoutPin.value = config.weight?.doutPin ?? '';
  hx711SckPin.value = config.weight?.sckPin ?? '';
  tareOffset.value = config.weight?.tareOffset ?? 0;
  temperatureEnabled.value = String(config.environment?.temperatureEnabled ?? true);
  humidityEnabled.value = String(config.environment?.humidityEnabled ?? true);
  thSensorType.value = config.environment?.combinedType || 'DHT22';
  thSensorPin.value = config.environment?.combinedPin ?? '';
  temperatureSensorType.value = config.environment?.temperatureType || 'DHT22';
  temperatureSensorPin.value = config.environment?.temperaturePin ?? '';
  humiditySensorType.value = config.environment?.humidityType || 'DHT22';
  humiditySensorPin.value = config.environment?.humidityPin ?? '';
  hallEnabled.value = String(config.hall?.enabled ?? true);
  hallPin.value = config.hall?.pin ?? '';
  hallOpenLevelHigh.value = String(config.hall?.openLevelHigh ?? false);
  hallWakeMode.value = config.hall?.wakeMode || 'HALL_NO_WAKE';
  batteryEnabled.value = String(config.battery?.enabled ?? true);
  batteryAdcPin.value = config.battery?.adcPin ?? '';
  batteryMinVoltage.value = config.battery?.minVoltage ?? 3.2;
  batteryMaxVoltage.value = config.battery?.maxVoltage ?? 4.2;
  batteryDividerRatio.value = config.battery?.dividerRatio ?? 1;
  adcReferenceVoltage.value = config.battery?.adcReferenceVoltage ?? 3.3;
  adcMaxValue.value = config.battery?.adcMaxValue ?? 1023;
  timeSource.value = config.time?.source || 'NTP';
  ntpServer.value = config.time?.ntpServer || 'pool.ntp.org';
  timezoneOffsetMinutes.value = config.time?.timezoneOffsetMinutes ?? 0;
  rtcNtpSyncIntervalMinutes.value = config.time?.rtcNtpSyncIntervalMinutes ?? 1440;
  measurementIntervalSeconds.value = config.measurementIntervalSeconds || 1800;
  deepSleepEnabled.value = String(!!config.deepSleepEnabled);
  weightThresholdKg.value = config.weight?.thresholdKg ?? 5;
  significantWeightChangeKg.value = config.weight?.significantChangeKg ?? 20;
  calibrationFactor.value = config.weight?.calibrationFactor ?? 1;
}
async function saveConfig() {
  config = {
    deviceId: deviceId.value, deviceToken: deviceToken.value, adminPassword: adminPassword.value,
    wifi:{ssid:wifiSsid.value,password:wifiPassword.value,apFallbackEnabled:true,apPassword:apPassword.value},
    mqtt:{host:mqttHost.value,port:+mqttPort.value,tls:mqttTls.value === 'true',user:mqttUser.value,password:mqttPassword.value},
    weight:{enabled:weightEnabled.value === 'true',doutPin:+hx711DoutPin.value,sckPin:+hx711SckPin.value,calibrationFactor:+calibrationFactor.value,tareOffset:+tareOffset.value,thresholdKg:+weightThresholdKg.value,significantChangeKg:+significantWeightChangeKg.value},
    environment:{temperatureEnabled:temperatureEnabled.value === 'true',humidityEnabled:humidityEnabled.value === 'true',combinedType:thSensorType.value,combinedPin:+thSensorPin.value,temperatureType:temperatureSensorType.value,temperaturePin:+temperatureSensorPin.value,humidityType:humiditySensorType.value,humidityPin:+humiditySensorPin.value},
    hall:{enabled:hallEnabled.value === 'true',pin:+hallPin.value,openLevelHigh:hallOpenLevelHigh.value === 'true',wakeMode:hallWakeMode.value},
    battery:{enabled:batteryEnabled.value === 'true',adcPin:+batteryAdcPin.value,minVoltage:+batteryMinVoltage.value,maxVoltage:+batteryMaxVoltage.value,dividerRatio:+batteryDividerRatio.value,adcReferenceVoltage:+adcReferenceVoltage.value,adcMaxValue:+adcMaxValue.value},
    time:{source:timeSource.value,ntpServer:ntpServer.value,timezoneOffsetMinutes:+timezoneOffsetMinutes.value,rtcNtpSyncIntervalMinutes:+rtcNtpSyncIntervalMinutes.value},
    measurementIntervalSeconds:+measurementIntervalSeconds.value,
    deepSleepEnabled:deepSleepEnabled.value === 'true'
  };
  await load();
  alert('Preview: настройки сохранены локально в странице');
}
async function tare(){ tareOffset.value = '0'; alert('Preview: тарирование'); }
async function calibrate(){ const kg = prompt('Укажите известный вес, кг'); if(kg) alert('Preview: калибровка по ' + kg + ' кг'); }
async function clearBuffer(){ alert('Preview: буфер очищен'); }
async function resetConfig(){ if(confirm('Сбросить настройки?')) location.reload(); }
async function restartDevice(){ alert('Preview: устройство перезагрузится'); }
load(); setInterval(load, 10000);
</script>
</body>
</html>
