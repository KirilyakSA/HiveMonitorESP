services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hivemonitor}
      POSTGRES_USER: ${POSTGRES_USER:-hivemonitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hivemonitor}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-hivemonitor} -d $${POSTGRES_DB:-hivemonitor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  api-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["/app/api-service"]
    environment:
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://hivemonitor:hivemonitor@postgres:5432/hivemonitor?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-1440}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-tcp://mosquitto:1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  mqtt-ingestion-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["/app/mqtt-ingestion-service"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://hivemonitor:hivemonitor@postgres:5432/hivemonitor?sslmode=disable}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-tcp://mosquitto:1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-hivemonitor-mqtt-ingestion}
      MQTT_TELEMETRY_TOPIC: ${MQTT_TELEMETRY_TOPIC:-hives/+/telemetry,apiaries/+/devices/+/telemetry,hives/+/events,apiaries/+/devices/+/events,hives/+/status,apiaries/+/devices/+/status}
      DEFAULT_APIARY_ID: ${DEFAULT_APIARY_ID:-}
      DEFAULT_TELEMETRY_INTERVAL_MINUTES: ${DEFAULT_TELEMETRY_INTERVAL_MINUTES:-30}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      mosquitto:
        condition: service_started

  worker-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["/app/worker-service"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://hivemonitor:hivemonitor@postgres:5432/hivemonitor?sslmode=disable}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      WORKER_TICK_SECONDS: ${WORKER_TICK_SECONDS:-60}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

volumes:
  postgres-data:
  nats-data:
  mosquitto-data:
  mosquitto-log:
