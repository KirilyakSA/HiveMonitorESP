services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hivemonitor
      POSTGRES_USER: hivemonitor
      POSTGRES_PASSWORD: hivemonitor
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hivemonitor -d hivemonitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  api-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["/app/api-service"]
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://hivemonitor:hivemonitor@postgres:5432/hivemonitor?sslmode=disable
      JWT_SECRET: dev-secret-change-me
      NATS_URL: nats://nats:4222
      MQTT_BROKER_URL: tcp://mosquitto:1883
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  mqtt-ingestion-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["/app/mqtt-ingestion-service"]
    environment:
      DATABASE_URL: postgres://hivemonitor:hivemonitor@postgres:5432/hivemonitor?sslmode=disable
      NATS_URL: nats://nats:4222
      MQTT_BROKER_URL: tcp://mosquitto:1883
      MQTT_TELEMETRY_TOPIC: hives/+/telemetry,apiaries/+/devices/+/telemetry
      DEFAULT_TELEMETRY_INTERVAL_MINUTES: "30"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      mosquitto:
        condition: service_started

volumes:
  postgres-data:
  nats-data:
  mosquitto-data:
  mosquitto-log:
